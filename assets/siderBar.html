<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="sideBar.css">
</head>

<body>
    <button class="menu-btn" aria-label="Open sidebar" onclick="document.body.classList.add('sidebar-open')">
        ☰
    </button>

    <aside class="sidebar" aria-label="Sidebar">
        <button class="close-btn" aria-label="Close sidebar" onclick="document.body.classList.remove('sidebar-open')">
            ✕
        </button>

        <nav class="sidebar-nav">
            <a href="#">Home</a>
            <a href="#">Projects</a>
            <a href="#">Teams</a>
            <a href="#">Settings</a>
        </nav>
    </aside>

    <div class="overlay" onclick="document.body.classList.remove('sidebar-open')" aria-hidden="true"></div>

    <main class="content">
        <h1>Page content</h1>
        <p>Resize the browser to see the sidebar behavior.</p>
    </main>
</body>

</html>
